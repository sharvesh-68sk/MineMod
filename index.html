<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Mod Updater</title>

<style>
body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:520px;
background:#0f172a;
padding:25px;
border-radius:16px;
box-shadow:0 0 30px rgba(0,0,0,.6);
}

.drop{
border:2px dashed #38bdf8;
padding:30px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

.file{
background:#1e293b;
padding:10px;
margin-top:10px;
border-radius:8px;
font-size:14px;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
background:#2563eb;
color:white;
}

#download{
background:gray;
cursor:not-allowed;
}

#download.active{
background:#22c55e;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Minecraft Mod Updater</h2>

<div class="drop" id="drop">
Drag & Drop Mods Here<br>or Click to Upload
<input type="file" id="fileInput" multiple hidden>
</div>

<div id="fileList"></div>

<select id="targetVersion">
<option value="1.20">Minecraft 1.20</option>
<option value="1.21">Minecraft 1.21</option>
<option value="1.22">Minecraft 1.22</option>
</select>

<select id="loader">
<option value="forge">Forge</option>
<option value="fabric">Fabric</option>
<option value="neoforge">NeoForge</option>
</select>

<button onclick="startAd()">Update & Watch Ad</button>

<button id="download" disabled onclick="downloadAll()">
Download Updated Mods
</button>

</div>

<script>

let files = [];
let unlocked = false;

const drop = document.getElementById("drop");
const input = document.getElementById("fileInput");
const list = document.getElementById("fileList");

drop.onclick = () => input.click();

drop.addEventListener("dragover", e=>{
e.preventDefault();
});

drop.addEventListener("drop", e=>{
e.preventDefault();
handleFiles(e.dataTransfer.files);
});

input.addEventListener("change", e=>{
handleFiles(e.target.files);
});

function detectLoader(name){
name = name.toLowerCase();

if(name.includes("forge")) return "Forge";
if(name.includes("fabric")) return "Fabric";
if(name.includes("neoforge")) return "NeoForge";

return "Unknown";
}

function handleFiles(fileList){

for(let file of fileList){

files.push(file);

let versionMatch = file.name.match(/1\.\d+/);
let version = versionMatch ? versionMatch[0] : "Unknown";

let loader = detectLoader(file.name);

let div = document.createElement("div");
div.className="file";
div.innerHTML = `
${file.name}<br>
Version: ${version} | Loader: ${loader}
`;

list.appendChild(div);
}

}

function startAd(){

if(files.length === 0){
alert("Upload mods first!");
return;
}

window.open("https://example.com","_blank");

let btn = document.getElementById("download");
let time = 10;

let timer = setInterval(()=>{
btn.innerText = "Waiting "+time+"s...";
time--;

if(time<0){
clearInterval(timer);
unlocked = true;
btn.disabled = false;
btn.classList.add("active");
btn.innerText="Download Updated Mods";
}
},1000);

}

function downloadAll(){

if(!unlocked) return;

let targetVersion = document.getElementById("targetVersion").value;
let loader = document.getElementById("loader").value;

files.forEach(file=>{

let newName = file.name
.replace(/1\.\d+/, targetVersion)
.replace(/forge|fabric|neoforge/i, loader);

const url = URL.createObjectURL(file);

const a = document.createElement("a");
a.href = url;
a.download = "updated-" + newName;
a.click();

});

}

</script>

</body>
</html>
